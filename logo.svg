<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
  
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  
    <radialGradient id="textGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b9d8f6"/>
      <stop offset="100%" stop-color="#dcedff"/>
    </radialGradient>
  </defs>

  
  <!-- <rect width="100%" height="100%" fill="#070c14"/> -->

  
  <g font-family="Arial Black, Helvetica, sans-serif"
     font-weight="900"
     font-size="170"
     text-anchor="middle"
     fill="url(#textGradient)"
     stroke="#e6f3ff"
     stroke-width="6"
     filter="url(#glow)">

    <text x="256" y="222">VE</text>
    <text x="256" y="382">LK</text>
  </g>
</svg>